name: "Data Issue"
description: "Report incorrect or missing data"
title: "[Data] "
labels: ["Data"]
body:
  - type: input
    id: addon_version
    attributes:
      label: "Addon version"
      description: "Which addon version are you using? Check in-game addon menu or your addon manager."
      placeholder: "v1.4.0, alpha, beta, git branch name, etc."
    validations:
      required: true

  - type: dropdown
    id: expansion
    attributes:
      label: "Expansion"
      options:
        - "The War Within"
        - "Midnight"
        - "Other"
    validations:
      required: true

  - type: dropdown
    id: profession
    attributes:
      label: "Profession"
      options:
        - "Alchemy"
        - "Blacksmithing"
        - "Enchanting"
        - "Engineering"
        - "Herbalism"
        - "Inscription"
        - "Jewelcrafting"
        - "Leatherworking"
        - "Mining"
        - "Skinning"
        - "Tailoring"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: "Describe the context/issue"
      description: "Is this about an item, quest, vendor, renown reward, world event, treasure...? Is the source missing, showing the wrong amount, appearing on the wrong characters...? Something else?"
      placeholder: "For example: |
        A renown reward from faction X gives 3 KP when it should be 2... |
        The item X is not listed in the profession Y... |
        A quest is not shown as available when it should be... |
        A column is showing the wrong data when it should be showing the correct data..."
    validations:
      required: true

  - type: textarea
    id: links
    attributes:
      label: "Links to valid sources"
      description: "Wowhead, Warcraft Wiki, or other authoritative links."
      placeholder: "https://www.wowhead.com/..."

  - type: textarea
    id: screenshots
    attributes:
      label: "Screenshots"
      description: "Upload screenshots here or paste image links."

  - type: textarea
    id: extra
    attributes:
      label: "Anything else?"
      description: "Any extra details that might help."
