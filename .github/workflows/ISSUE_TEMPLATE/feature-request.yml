name: "Feature Request"
description: "Suggest a new feature or improvement"
title: "[Feature] "
labels: ["Feature Request"]
body:
  - type: dropdown
    id: addon_version
    attributes:
      label: "Addon version"
      description: "Which addon version are you using?"
      options:
        - "Latest release (CurseForge/Wago etc.)"
        - "Alpha / Beta"
        - "Git development version"
    validations:
      required: true

  - type: textarea
    id: needs
    attributes:
      label: "Describe your needs"
      description: "What problem are you trying to solve, or what are you missing?"
      placeholder: "I want to be able to..."
    validations:
      required: true

  - type: textarea
    id: desired
    attributes:
      label: "Desired data / layout / solution"
      description: "What would you like to see in the UI or data?"
      placeholder: "For example, a new column that shows..."
    validations:
      required: true

  - type: textarea
    id: inspiration
    attributes:
      label: "Inspiration"
      description: "Links or names of other addons / UIs that do something similar."
      placeholder: "Addon X or program Y has a view where..."

  - type: textarea
    id: extra
    attributes:
      label: "Anything else?"
      description: "Any extra details that might help."
